name: Publish Package to npmjs

on:
  push:
    tags: ['v*']

jobs:
  build-x86_64:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel pkg-config nodejs npm rustup
          rustup default stable
          npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --no-optional

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

      - name: Upload native binding
        uses: actions/upload-artifact@v4
        with:
          name: bindings-linux-x64-gnu
          path: "*.node"
          if-no-files-found: error

      - name: Upload JS binding
        uses: actions/upload-artifact@v4
        with:
          name: js-binding
          path: |
            index.js
            index.d.ts
          if-no-files-found: error

  build-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # No tests — QEMU-emulated environment has no local pacman DB
      - name: Build (aarch64)
        uses: uraimo/run-on-arch-action@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          arch: aarch64
          distro: archarm_latest
          githubToken: ${{ github.token }}
          install: |
            sed -i '/^\[options\]/a DisableSandbox' /etc/pacman.conf
            pacman -Syu --noconfirm
            pacman -S --noconfirm base-devel pkg-config nodejs npm rustup
            rustup default stable
            npm install -g pnpm
          run: |
            pnpm install --no-optional
            pnpm run build

      - name: Upload native binding
        uses: actions/upload-artifact@v4
        with:
          name: bindings-linux-arm64-gnu
          path: "*.node"
          if-no-files-found: error

  publish:
    needs: [build-x86_64, build-aarch64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "25.x"
          registry-url: "https://registry.npmjs.org"

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Publishing version $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          for dir in npm/*/; do
            (cd "$dir" && npm version "$VERSION" --no-git-tag-version --allow-same-version)
          done
          for dep in $(node -e "Object.keys(require('./package.json').optionalDependencies||{}).forEach(d=>console.log(d))"); do
            npm pkg set "optionalDependencies.$dep=$VERSION"
          done

      - name: Download JS binding
        uses: actions/download-artifact@v4
        with:
          name: js-binding
          path: .

      - name: Download all native bindings
        uses: actions/download-artifact@v4
        with:
          pattern: bindings-*
          path: artifacts
          merge-multiple: true

      - name: Move artifacts
        run: npx -y @napi-rs/cli artifacts --npm-dir npm --build-output-dir artifacts

      - name: List packages
        run: |
          echo "=== Main package ==="
          npm pack --dry-run
          for dir in npm/*/; do
            echo "=== $dir ==="
            (cd "$dir" && npm pack --dry-run)
          done

      - name: Publish platform packages
        run: |
          for dir in npm/*/; do
            if [ -d "$dir" ] && ls "$dir"*.node 1>/dev/null 2>&1; then
              echo "Publishing $dir..."
              (cd "$dir" && npm publish --provenance --access public)
            fi
          done

      - name: Publish main package
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
